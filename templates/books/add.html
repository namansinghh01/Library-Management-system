{% extends 'base.html' %}

{% block title %}Add Book | Libraria{% endblock %}
{% block header %}Add New Book{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="px-8 py-6 border-b border-gray-100">
        <h3 class="font-semibold text-gray-800">Book Information</h3>
        <p class="text-sm text-gray-500 mt-1">Add a new book to the library inventory.</p>
    </div>

    <div class="p-8">
        <form action="{{ url_for('book.add_book') }}" method="POST" class="space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-1 md:col-span-2">
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Book Title *</label>
                    <input type="text" name="title" id="title" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all"
                        placeholder="e.g. Harry Potter and the Sorcerer's Stone">
                </div>

                <div>
                    <label for="isbn" class="block text-sm font-medium text-gray-700 mb-1">ISBN Number *</label>
                    <input type="text" name="isbn" id="isbn" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all"
                        placeholder="e.g. 978-0439708180">
                </div>

                <div>
                    <label for="author_id" class="block text-sm font-medium text-gray-700 mb-1">Author *</label>
                    <select name="author_id" id="author_id" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all bg-white">
                        <option value="" disabled selected>Select an Author</option>
                        {% for author in authors %}
                        <option value="{{ author.id }}">{{ author.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <label for="total_copies" class="block text-sm font-medium text-gray-700 mb-1">Total Copies
                    *</label>
                <input type="number" name="total_copies" id="total_copies" required min="1" value="1"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all">
            </div>

            <div class="col-span-1 md:col-span-2">
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category (Genre /
                    Subject)</label>
                <select name="category" id="category"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all bg-white text-gray-700">
                    <option value="" disabled selected>Select a Category</option>
                    <option value="Programming">Programming</option>
                    <option value="Science">Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Fiction">Fiction</option>
                    <option value="History">History</option>
                    <option value="Biography">Biography</option>
                    <option value="Literature">Literature</option>
                    <option value="Other">Other</option>
                </select>
            </div>
    </div>

    <div class="pt-4 flex items-center justify-end space-x-4">
        <a href="{{ url_for('book.list_books') }}"
            class="px-5 py-2.5 text-gray-600 font-medium hover:text-gray-800 transition-colors">Cancel</a>
        <button type="submit"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-medium transition-colors shadow-sm">
            Save Book
        </button>
    </div>
    </form>
</div>
</div>
{% endblock %}
